<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <title>Notes App</title>
        <link
            rel="stylesheet"
            href="/static/css/style.css" />
    </head>

    <body>
        <header>
            <h1>Notes App</h1>
        </header>

        <main>
            <section aria-labelledby="notes-heading">
                <h2 class="spaced-top-bottom" id="notes-heading">Notes</h2>

                <ol>
                    {%for note in notes%}
                    <li><h3>{{ note["title"] }}</h3></li>
                    <li>{{ note["description"] }}</li>
                    <span id="note-id">{{ note["id"] }}</span>
                    <button id="delete-note-btn" type="button" title="Deletes note">🗑️</button>
                </ol>
                {%endfor%}
            </section>

            <form action="/add-note" method="post">
                <p>Add numbered notes.</p>

                <label for="title">Title:</label>
                <input
                    id="title"
                    name="title"
                    type="text"
                    placeholder="Title..."
                    autocapitalize="on"
                    required />
                <label for="description"
                    >Description:</label
                >
                <input
                    id="description"
                    name="description"
                    type="text"
                    placeholder="Description..."
                    required />

                <button type="submit">Add note</button>
            </form>

            <section aria-labelledby="todos-heading">
                <h2 class="spaced-top-bottom" id="todos-heading">TODOs</h2>

                <ol>
                    {%for todo in todos%}
                    <li><h3>{{ todo["title"] }}</h3></li>
                    <li>{{ todo["description"] }}</li>
                    <li>
                        <input
                        type="checkbox"
                        value="{{ todo["task_done"] }}" />
                    </li>
                    <span id="todo-id">{{ todo["id"] }}</span>
                    <button id="delete-todo-btn" type="button" title="Deletes TODO">🗑️</button>
                </ol>
                {%endfor%}
            </section>

            <form action="/add-todo" method="post">
                <p>Add TODOs.</p>

                <label for="title">Title:</label>
                <input
                    id="title"
                    name="title"
                    type="text"
                    placeholder="Title..."
                    autocapitalize="on"
                    required />
                <label for="description"
                    >Description:</label
                >
                <input
                    id="description"
                    name="description"
                    type="text"
                    placeholder="Description..."
                    required />
                <label for="task-done">Task done?</label>
                <input
                    id="task-done"
                    name="task-done"
                    type="checkbox" />

                <button type="submit">Add TODO</button>
            </form>
        </main>

        <script src="/static/js/script.js" defer></script>

    </body>
</html>
